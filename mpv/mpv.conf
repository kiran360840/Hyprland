# --- Video Output (Hyprland Optimized) ---
vo=gpu-next
gpu-api=opengl             # Most stable for Hyprland
gpu-context=auto           # Let mpv pick the best Wayland/XWayland bridge
hwdec=auto-safe            
force-window=immediate     # Force the window to spawn even before the stream loads

# --- Display & UI ---
fullscreen=no
keep-open=yes
autofit-larger=1366x768
cursor-autohide=1000

# --- Quality & Scaling ---
profile=high-quality
dither-depth=auto
deband=yes

# --- Subtitles ---
sub-auto=all
sub-font='sans-serif'
sub-font-size=40
sub-color='#FFFFFFFF'
sub-border-size=2
sub-shadow-offset=1

# --- Audio ---
volume=130
volume-max=200

# --- Screenshot Settings ---
screenshot-directory="~/Pictures/Anime-Screenshot/"
screenshot-format=png
screenshot-template="mpv-screenshot-%F-%p"
screenshot-high-bit-depth=yes

# --- Subtitle Language Priority ---
slang=en,eng,enm,fr,fra,de,ger   # Prioritize English, then French, then German
alang=jp,jpn,en,eng              # Prioritize Japanese audio (for subbed anime)

# --- Playlist Behavior ---
keep-open=yes
save-position-on-quit=yes

# --- Disable default UI for custom GUI ---
osc=no
osd-bar=no
border=no
cursor-autohide=1000
# --- Log ---
msg-level=all=status

# --- Subtitle Positioning ---
sub-align-x=center
sub-align-y=bottom
sub-margin-y=36       # Height from the bottom
sub-margin-x=0        # No side margins (keeps it centered)
# Force uosc to not interfere with sub placement
sub-ass-override=force