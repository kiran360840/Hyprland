# --- Playback Controls ---
SPACE        cycle pause          # Toggle play/pause with Space
MBTN_LEFT    cycle pause          # Toggle play/pause with Left Click
k            cycle pause          # Classic YouTube-style pause

# --- Seeking (Skipping) ---
RIGHT        seek  5              # Skip 5 seconds forward
LEFT         seek -5              # Skip 5 seconds backward
UP           add volume  2        # Increase volume
DOWN         add volume -2        # Decrease volume
WHEEL_UP     add volume  2        # Mouse wheel volume
WHEEL_DOWN   add volume -2        # Mouse wheel volume

# --- Speed Control ---
[            add speed -0.1       # Slow down
]            add speed  0.1       # Speed up
BS           set speed  1.0       # Reset speed to normal

# --- Requested Controls ---
f            cycle fullscreen      # Toggle fullscreen
p            screenshot            # Take a screenshot
c            cycle sub-visibility  # Toggle subtitles on/off
h            cycle-values hwdec "auto-safe" "no" # Toggle hardware acceleration
             
# --- Subtitle Controls ---
g             cycle sub            # Cycle forward through languages (English -> French, etc.)
h             cycle sub down       # Cycle backward through languages (English <- French, etc.)
=             add sub-font-size +2 # subtitle font size increased
-             add sub-font-size -2 # subtitle font size decreased

# --- Episode Navigation (Next/Prev) ---
SHIFT+RIGHT  playlist-next        # Skip to the next episode
SHIFT+LEFT   playlist-prev        # Go back to the previous episode